{% extends 'base.html' %}

{% block content %}
<div class="row min-vh-100 align-items-center justify-content-center">
    <div class="col-md-5">
        <div class="glass-card text-center p-5 shadow-lg">
            <h2 class="mb-4">
                <span class="gradient-text fw-bold">Enterprise</span>Procurement
            </h2>
            <p class="text-muted mb-4">Secure Gateway Authentication</p>

            <div id="firebase-ui-container">
                <div class="alert mb-4 text-start"
                    style="font-size:0.95rem; background:rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff;">
                    <strong>Available Test Accounts:</strong><br>
                    <ul class="mb-0 mt-2 text-white" style="list-style-type: square; padding-left: 20px;">
                        <li>employee@test.com</li>
                        <li>manager@test.com</li>
                        <li>procurement@test.com</li>
                        <li>vendor@test.com</li>
                        <li>finance@test.com</li>
                        <li>admin@test.com</li>
                    </ul>
                    <div class="mt-3 text-center w-100">
                        <span class="badge bg-secondary px-3 py-2" style="font-size: 0.9rem;">Password for all:
                            <strong>123456</strong></span>
                    </div>
                </div>

                <form id="firebaseLogin">
                    <div class="mb-3 text-start">
                        <label class="form-label text-muted">Email address</label>
                        <input type="email" id="fbEmail" class="form-control" autocomplete="username" required>
                    </div>
                    <div class="mb-4 text-start">
                        <label class="form-label text-muted">Password</label>
                        <input type="password" id="fbPassword" class="form-control" autocomplete="current-password"
                            required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Secure Login</button>
                    <small id="fbError" class="text-danger mt-3 d-block fw-bold"></small>
                </form>
            </div>

        </div>
    </div>
</div>

<!-- Firebase Auth SDK integration -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // IMPORTANT: Provide your Firebase Web Config here for real Firebase Auth to work!
    const firebaseConfig = {
        apiKey: "AIzaSyDYqQ8ArAd1x2HmYN06Y5ucoY4CGcTtUY8",
        authDomain: "procurement-system-b547c.firebaseapp.com",
        projectId: "procurement-system-b547c",
        storageBucket: "procurement-system-b547c.firebasestorage.app",
        messagingSenderId: "366350989948",
        appId: "1:366350989948:web:0e0e22f99055df730f27f9",
        measurementId: "G-YKK0CBSJH5"
    };

    let auth = null;
    try {
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
    } catch (e) {
        console.warn("Firebase not properly configured. Fallback Demo mode should be used.");
    }

    async function loginBackend(email) {
        const resp = await fetch('/api/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email })
        });
        const data = await resp.json();
        if (data.success) {
            window.location.href = data.redirect;
        } else {
            throw new Error(data.error || "Internal access denied.");
        }
    }

    document.getElementById('firebaseLogin').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('fbEmail').value;
        const password = document.getElementById('fbPassword').value;
        const errSpan = document.getElementById('fbError');

        if (!auth) {
            errSpan.innerText = "Firebase not initialized.";
            return;
        }

        try {
            errSpan.className = "text-info mt-3 d-block fw-bold";
            errSpan.innerText = "Authenticating securely...";

            await signInWithEmailAndPassword(auth, email, password);

            errSpan.innerText = "Verifying Internal Records...";
            await loginBackend(email);
        } catch (error) {
            errSpan.className = "text-danger mt-3 d-block fw-bold";
            let msg = error.message;
            if (msg.includes('auth/invalid-credential')) msg = "Incorrect password or email.";
            errSpan.innerText = "Error: " + msg;
        }
    });
</script>
{% endblock %}
